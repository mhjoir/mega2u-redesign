<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=/" />
  <title>جارٍ التحويل... | MEGA2U</title>
  <script>
    // إعادة التوجيه الفورية إلى الصفحة الرئيسية مع الحفاظ على المسار الأصلي
    (function () {
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/?redirect=' + encodeURIComponent(path));
    })();
  </script>
  <style>
    body { font-family: 'Cairo', sans-serif; text-align: center; padding: 50px; background: #f5f6fa; }
    .loader { border: 4px solid #e7eaf3; border-top: 4px solid #ff6b35; border-radius: 50%;
              width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2>جارٍ تحويلك إلى الصفحة المطلوبة...</h2>
  <p>إذا لم يتم التحويل تلقائياً، <a href="/">انقر هنا</a>.</p>
</body>
</html>
